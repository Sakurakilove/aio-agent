[tools]
enabled = []
disabled = []

[permissions]
allow = ["execute(file_read)", "execute(file_write)", "execute(web_search)", "execute(web_fetch)", "execute(list_dir)", "execute(terminal)"]
deny = ["execute(rm -rf /)", "execute(sudo rm -rf)", "execute(format c:)"]
